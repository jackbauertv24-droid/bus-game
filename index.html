<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bus Driving Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #87CEEB;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }

        #ui h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #ui p {
            font-size: 14px;
            margin: 5px 0;
        }

        #speed {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        #resetBtn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #resetBtn:hover {
            background: #45a049;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        #controls button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
            color: white;
        }

        #controls button:active {
            background: rgba(100, 100, 100, 0.9);
        }

        #controls .row {
            display: flex;
            justify-content: center;
        }

        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🚌 3D Bus Driving</h1>
        <p>W / ↑: Accelerate</p>
        <p>S / ↓: Brake / Reverse</p>
        <p>A / ←: Steer Left</p>
        <p>D / →: Steer Right</p>
        <p>R: Reset Position</p>
        <div id="speed">Speed: 0 km/h</div>
        <button id="resetBtn">Reset Bus</button>
    </div>

    <div id="debug">
        <div>Debug Info:</div>
        <div id="keyStatus">Key: none</div>
        <div id="forceStatus">Force: 0</div>
        <div id="velocityStatus">Velocity: 0, 0, 0</div>
        <div id="positionStatus">Pos: 0, 0, 0</div>
    </div>

    <div id="controls">
        <div class="row">
            <button id="btnUp">↑</button>
        </div>
        <div class="row">
            <button id="btnLeft">←</button>
            <button id="btnDown">↓</button>
            <button id="btnRight">→</button>
        </div>
        <div class="row">
            <button id="btnImpulse" style="width: 200px; background: rgba(200, 0, 0, 0.8);">TEST: Apply Impulse</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>

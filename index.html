<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bus Driving Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #87CEEB;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }

        #ui h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #ui p {
            font-size: 14px;
            margin: 5px 0;
        }

        #speed {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        #resetBtn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #resetBtn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🚌 3D Bus Driving</h1>
        <p>W / ↑: Accelerate</p>
        <p>S / ↓: Brake / Reverse</p>
        <p>A / ←: Steer Left</p>
        <p>D / →: Steer Right</p>
        <p>R: Reset Position</p>
        <div id="speed">Speed: 0 km/h</div>
        <button id="resetBtn">Reset Bus</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
